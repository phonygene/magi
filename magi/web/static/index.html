<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAGI SYSTEM — NERV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --orange: #ff8800;
    --orange-dim: #aa5500;
    --orange-glow: #ff990044;
    --cyan-panel: #8ec8d8;
    --cyan-active: #a0e0f0;
    --cyan-thinking: #60a0b8;
    --dark-blue-text: #1a2a4a;
    --bg: #000000;
    --bg-panel: #050510;
    --green: #00dd66;
    --red: #ff2222;
    --red-dim: #881111;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--orange);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* === CRT SCANLINES === */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      transparent, transparent 2px,
      rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* === TOP BAR === */
  .top-bar {
    display: flex;
    justify-content: space-between;
    padding: 6px 16px;
    font-size: 11px;
    border-bottom: 1px solid var(--orange-dim);
    background: #0a0505;
    flex-shrink: 0;
  }

  .top-bar .sys-info {
    color: var(--orange);
    letter-spacing: 1px;
  }

  .top-bar .jp-text {
    font-size: 16px;
    color: var(--orange);
    font-weight: bold;
  }

  /* === MAIN AREA === */
  .main {
    flex: 1;
    display: flex;
    position: relative;
    overflow: hidden;
  }

  /* === LEFT PANEL — SYSTEM INFO === */
  .sys-panel {
    width: 240px;
    padding: 12px;
    border-right: 1px solid var(--orange-dim);
    font-size: 11px;
    line-height: 1.8;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

  .sys-panel .code-block {
    color: var(--orange);
    margin-bottom: 16px;
  }

  .sys-panel .code-block .label {
    color: var(--orange-dim);
    font-size: 9px;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .sys-panel .code-block .value {
    font-size: 18px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
  }

  .mode-select {
    background: #111;
    border: 1px solid var(--orange-dim);
    color: var(--orange);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 6px 8px;
    width: 100%;
    margin-top: 4px;
  }

  .mode-select:focus { outline: none; border-color: var(--orange); }

  /* === HEXAGON AREA === */
  .hex-area {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* SVG connecting lines */
  .hex-connections {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  .hex-connections line {
    stroke: var(--orange);
    stroke-width: 3;
    opacity: 0.6;
  }

  .hex-connections line.active {
    opacity: 1;
    filter: drop-shadow(0 0 4px var(--orange));
    animation: line-pulse 1.5s infinite;
  }

  @keyframes line-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Center MAGI label */
  .magi-center {
    position: absolute;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: var(--orange);
    letter-spacing: 6px;
    text-shadow: 0 0 20px var(--orange-glow);
    z-index: 10;
  }

  /* === HEXAGON NODE === */
  .hex-node {
    position: absolute;
    width: 260px;
    height: 260px;
    cursor: default;
  }

  .hex-shape {
    width: 100%;
    height: 100%;
    clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
    background: var(--cyan-panel);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.5s, filter 0.5s;
    position: relative;
  }

  .hex-shape.idle { background: var(--cyan-panel); }
  .hex-shape.thinking {
    background: var(--cyan-thinking);
    animation: hex-think 1s infinite;
  }
  .hex-shape.done { background: var(--cyan-active); }
  .hex-shape.error { background: #d88888; }
  .hex-shape.critiquing {
    background: #88c8d8;
    animation: hex-think 2s infinite;
  }

  @keyframes hex-think {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(0.7); }
  }

  .hex-node-name {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 18px;
    color: var(--dark-blue-text);
    letter-spacing: 3px;
    text-align: center;
  }

  .hex-node-number {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--dark-blue-text);
    opacity: 0.6;
    margin-top: 2px;
  }

  .hex-status-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--dark-blue-text);
    letter-spacing: 1px;
    margin-top: 8px;
    padding: 2px 10px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
  }

  /* Hexagon positioning — triangle layout */
  .hex-node.top    { top: 5%;  left: 50%; transform: translateX(-50%); }
  .hex-node.left   { bottom: 8%; left: 12%; }
  .hex-node.right  { bottom: 8%; right: 12%; }

  /* === INPUT BAR === */
  .input-bar {
    display: flex;
    padding: 8px 16px;
    border-top: 1px solid var(--orange-dim);
    background: #050505;
    gap: 8px;
    flex-shrink: 0;
  }

  .input-bar textarea {
    flex: 1;
    background: #0a0a0a;
    border: 1px solid var(--orange-dim);
    color: var(--orange);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    resize: none;
    height: 40px;
  }

  .input-bar textarea:focus { outline: none; border-color: var(--orange); }
  .input-bar textarea::placeholder { color: var(--orange-dim); }

  .btn-execute {
    background: transparent;
    border: 2px solid var(--orange);
    color: var(--orange);
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 3px;
    padding: 0 24px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-execute:hover { background: var(--orange); color: black; }
  .btn-execute:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-execute.running {
    border-color: var(--red);
    color: var(--red);
    animation: btn-pulse 1s infinite;
  }

  @keyframes btn-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* === RIGHT PANEL — DECISION === */
  .decision-panel {
    width: 320px;
    border-left: 1px solid var(--orange-dim);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    font-size: 11px;
  }

  .decision-panel .panel-title {
    padding: 8px 12px;
    border-bottom: 1px solid var(--orange-dim);
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--orange);
  }

  .decision-panel .jp-title {
    float: right;
    font-family: sans-serif;
    font-size: 14px;
  }

  .decision-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--orange-dim);
    border-bottom: 1px solid var(--orange-dim);
  }

  .metric-cell {
    background: var(--bg-panel);
    padding: 8px;
    text-align: center;
  }

  .metric-cell .m-label {
    font-size: 9px;
    color: var(--orange-dim);
    letter-spacing: 1px;
  }

  .metric-cell .m-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-top: 2px;
  }

  .m-value.high { color: var(--green); }
  .m-value.medium { color: var(--orange); }
  .m-value.low { color: var(--red); }

  .decision-content {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    font-size: 11px;
    line-height: 1.6;
    color: var(--orange);
  }

  .decision-content .section-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--orange-dim);
    margin-top: 12px;
    margin-bottom: 4px;
    border-bottom: 1px solid #1a1a1a;
    padding-bottom: 2px;
  }

  .decision-content .ruling-text {
    white-space: pre-wrap;
    word-break: break-word;
  }

  .decision-content .minority-text {
    color: var(--red);
    white-space: pre-wrap;
    word-break: break-word;
    opacity: 0.8;
  }

  .decision-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--orange-dim);
    font-size: 10px;
    letter-spacing: 2px;
  }

  /* === NODE DETAIL POPUP === */
  .node-detail {
    display: none;
    position: absolute;
    bottom: 0;
    left: 240px;
    right: 320px;
    max-height: 40%;
    background: rgba(5,5,10,0.95);
    border-top: 2px solid var(--orange);
    z-index: 100;
    overflow-y: auto;
    padding: 12px 16px;
    font-size: 11px;
    line-height: 1.6;
  }

  .node-detail.visible { display: block; }

  .node-detail .detail-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .node-detail .detail-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
  }

  .node-detail .detail-close {
    cursor: pointer;
    color: var(--orange-dim);
    font-size: 16px;
  }

  .node-detail .detail-close:hover { color: var(--orange); }

  .node-detail .detail-body {
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--orange);
    opacity: 0.9;
  }

  /* node click */
  .hex-node { cursor: pointer; }

  /* Responsive */
  @media (max-width: 1200px) {
    .sys-panel { width: 180px; }
    .decision-panel { width: 260px; }
    .hex-node { width: 200px; height: 200px; }
    .hex-node-name { font-size: 14px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="sys-info" id="sysInfo">FILE:MAGI_SYS&nbsp;&nbsp;&nbsp;EXTENTION:6008&nbsp;&nbsp;&nbsp;EX_MODE:OFF&nbsp;&nbsp;&nbsp;PRIORITY:AAA</div>
  <div>
    <span class="jp-text">決議</span>
    &nbsp;&nbsp;
    <span class="sys-info" id="statusText">STANDBY</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: System Panel -->
  <div class="sys-panel">
    <div class="code-block">
      <div class="label">CODE</div>
      <div class="value" id="codeValue">000</div>
    </div>
    <div class="code-block">
      <div class="label">PROTOCOL</div>
      <div class="value" style="font-size:13px" id="protoValue">STANDBY</div>
    </div>
    <div class="code-block">
      <div class="label">AGREEMENT</div>
      <div class="value" id="agreeValue">---</div>
    </div>
    <div class="code-block">
      <div class="label">LATENCY</div>
      <div class="value" style="font-size:14px" id="latValue">---</div>
    </div>

    <div style="margin-top:auto">
      <div class="label" style="color:var(--orange-dim);font-size:9px;letter-spacing:2px;margin-bottom:4px">MODE</div>
      <select class="mode-select" id="modeSelect">
        <option value="adaptive">ADAPTIVE</option>
        <option value="vote">VOTE</option>
        <option value="critique">CRITIQUE</option>
        <option value="escalate">ESCALATE</option>
      </select>
      <div class="label" style="color:var(--orange-dim);font-size:9px;letter-spacing:2px;margin-top:12px;margin-bottom:4px">PRESET</div>
      <select class="mode-select" id="presetSelect">
        <option value="eva">EVA</option>
        <option value="code-review">CODE REVIEW</option>
        <option value="research">RESEARCH</option>
        <option value="strategy">STRATEGY</option>
        <option value="writing">WRITING</option>
      </select>
    </div>
  </div>

  <!-- CENTER: Hexagon Area -->
  <div class="hex-area">
    <!-- SVG connections -->
    <svg class="hex-connections" id="hexSvg"></svg>

    <!-- Center label -->
    <div class="magi-center" id="magiCenter">MAGI</div>

    <!-- Three hex nodes -->
    <div class="hex-node top" id="hexMelchior" onclick="showDetail('melchior')">
      <div class="hex-shape idle" id="shapeMelchior">
        <div class="hex-node-name">MELCHIOR</div>
        <div class="hex-node-number">1</div>
        <div class="hex-status-badge" id="badgeMelchior">IDLE</div>
      </div>
    </div>

    <div class="hex-node left" id="hexBalthasar" onclick="showDetail('balthasar')">
      <div class="hex-shape idle" id="shapeBalthasar">
        <div class="hex-node-name">BALTHASAR</div>
        <div class="hex-node-number">2</div>
        <div class="hex-status-badge" id="badgeBalthasar">IDLE</div>
      </div>
    </div>

    <div class="hex-node right" id="hexCasper" onclick="showDetail('casper')">
      <div class="hex-shape idle" id="shapeCasper">
        <div class="hex-node-name">CASPER</div>
        <div class="hex-node-number">3</div>
        <div class="hex-status-badge" id="badgeCasper">IDLE</div>
      </div>
    </div>

    <!-- Node detail popup -->
    <div class="node-detail" id="nodeDetail">
      <div class="detail-header">
        <span class="detail-title" id="detailTitle">MELCHIOR</span>
        <span class="detail-close" onclick="hideDetail()">X</span>
      </div>
      <div class="detail-body" id="detailBody"></div>
    </div>
  </div>

  <!-- RIGHT: Decision Panel -->
  <div class="decision-panel">
    <div class="panel-title">
      DECISION <span class="jp-title">決議結果</span>
    </div>
    <div class="decision-metrics">
      <div class="metric-cell">
        <div class="m-label">CONFIDENCE</div>
        <div class="m-value" id="confValue">---</div>
      </div>
      <div class="metric-cell">
        <div class="m-label">ROUNDS</div>
        <div class="m-value" id="roundValue">0</div>
      </div>
    </div>
    <div class="decision-content" id="decisionContent">
      <div class="decision-empty">AWAITING QUERY</div>
    </div>
  </div>

</div>

<!-- INPUT BAR -->
<div class="input-bar">
  <textarea id="queryInput" placeholder="ENTER QUERY FOR MAGI SYSTEM..." rows="1">What are the key tradeoffs between microservices and monolithic architecture?</textarea>
  <button class="btn-execute" id="executeBtn" onclick="execute()">EXECUTE</button>
</div>

<script>
const WS_URL = `ws://${location.host}/ws/ask`;
let nodeAnswers = {};
let currentRound = 0;

// Draw SVG connecting lines between hexagons
function drawConnections() {
  const svg = document.getElementById('hexSvg');
  const area = document.querySelector('.hex-area');
  const nodes = {
    melchior: document.getElementById('hexMelchior'),
    balthasar: document.getElementById('hexBalthasar'),
    casper: document.getElementById('hexCasper'),
  };

  function center(el) {
    const r = el.getBoundingClientRect();
    const ar = area.getBoundingClientRect();
    return { x: r.left - ar.left + r.width/2, y: r.top - ar.top + r.height/2 };
  }

  const m = center(nodes.melchior);
  const b = center(nodes.balthasar);
  const c = center(nodes.casper);

  svg.innerHTML = `
    <line id="lineMB" x1="${m.x}" y1="${m.y}" x2="${b.x}" y2="${b.y}"/>
    <line id="lineMC" x1="${m.x}" y1="${m.y}" x2="${c.x}" y2="${c.y}"/>
    <line id="lineBC" x1="${b.x}" y1="${b.y}" x2="${c.x}" y2="${c.y}"/>
  `;

  // Position MAGI label at centroid
  const cx = (m.x + b.x + c.x) / 3;
  const cy = (m.y + b.y + c.y) / 3;
  const mc = document.getElementById('magiCenter');
  mc.style.left = cx + 'px';
  mc.style.top = cy + 'px';
  mc.style.transform = 'translate(-50%, -50%)';
}

window.addEventListener('resize', drawConnections);
setTimeout(drawConnections, 100);

function setHexStatus(node, status, text) {
  const shape = document.getElementById(`shape${node.charAt(0).toUpperCase() + node.slice(1)}`);
  shape.className = `hex-shape ${status}`;
  document.getElementById(`badge${node.charAt(0).toUpperCase() + node.slice(1)}`).textContent = text || status.toUpperCase();
}

function setLinesActive(active) {
  document.querySelectorAll('.hex-connections line').forEach(l => {
    l.classList.toggle('active', active);
  });
}

function showDetail(node) {
  const detail = document.getElementById('nodeDetail');
  const name = node.toUpperCase();
  document.getElementById('detailTitle').textContent = name;
  document.getElementById('detailBody').textContent = nodeAnswers[node] || 'No response yet.';
  detail.classList.add('visible');
}

function hideDetail() {
  document.getElementById('nodeDetail').classList.remove('visible');
}

function resetUI() {
  ['melchior','balthasar','casper'].forEach(n => setHexStatus(n, 'idle', 'IDLE'));
  setLinesActive(false);
  nodeAnswers = {};
  currentRound = 0;
  document.getElementById('protoValue').textContent = 'STANDBY';
  document.getElementById('agreeValue').textContent = '---';
  document.getElementById('latValue').textContent = '---';
  document.getElementById('confValue').textContent = '---';
  document.getElementById('confValue').className = 'm-value';
  document.getElementById('roundValue').textContent = '0';
  document.getElementById('decisionContent').innerHTML = '<div class="decision-empty">PROCESSING...</div>';
  hideDetail();
}

function execute() {
  const query = document.getElementById('queryInput').value.trim();
  if (!query) return;

  const btn = document.getElementById('executeBtn');
  btn.disabled = true;
  btn.classList.add('running');
  btn.textContent = 'ACTIVE';
  resetUI();

  document.getElementById('statusText').textContent = 'CONNECTING';
  document.getElementById('codeValue').textContent = String(Math.floor(Math.random()*999)).padStart(3,'0');

  const ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    document.getElementById('statusText').textContent = 'TRANSMITTING';
    setLinesActive(true);
    ws.send(JSON.stringify({
      query,
      mode: document.getElementById('modeSelect').value,
      preset: document.getElementById('presetSelect').value,
    }));
  };

  ws.onmessage = (e) => handleEvent(JSON.parse(e.data));

  ws.onclose = () => {
    btn.disabled = false;
    btn.classList.remove('running');
    btn.textContent = 'EXECUTE';
  };

  ws.onerror = () => {
    document.getElementById('statusText').textContent = 'CONNECTION FAILED';
    btn.disabled = false;
    btn.classList.remove('running');
    btn.textContent = 'EXECUTE';
  };
}

function handleEvent(data) {
  switch(data.event) {
    case 'start':
      document.getElementById('statusText').textContent = 'QUERYING NODES';
      document.getElementById('protoValue').textContent = data.mode.toUpperCase();
      break;

    case 'node_start':
      setHexStatus(data.node, 'thinking', 'THINKING');
      break;

    case 'node_done':
      setHexStatus(data.node, 'done', 'COMPLETE');
      nodeAnswers[data.node] = data.answer;
      break;

    case 'node_error':
      setHexStatus(data.node, 'error', 'FAILED');
      nodeAnswers[data.node] = 'ERROR: ' + data.error;
      break;

    case 'agreement':
      document.getElementById('agreeValue').textContent = (data.score * 100).toFixed(0) + '%';
      document.getElementById('protoValue').textContent = data.route.toUpperCase();
      document.getElementById('statusText').textContent = `ROUTE: ${data.route.toUpperCase()}`;
      break;

    case 'critique_start':
      currentRound = data.round;
      document.getElementById('roundValue').textContent = data.round;
      document.getElementById('statusText').textContent = `CRITIQUE R${data.round}`;
      ['melchior','balthasar','casper'].forEach(n => {
        if (document.getElementById(`badge${n.charAt(0).toUpperCase()+n.slice(1)}`).textContent !== 'FAILED')
          setHexStatus(n, 'critiquing', `CRITIQUE R${data.round}`);
      });
      break;

    case 'critique_done':
      setHexStatus(data.node, 'done', `R${data.round} DONE`);
      nodeAnswers[data.node] = data.answer;
      break;

    case 'critique_agreement':
      document.getElementById('agreeValue').textContent = (data.score * 100).toFixed(0) + '%';
      break;

    case 'decision':
      setLinesActive(false);
      document.getElementById('statusText').textContent = 'DECISION RENDERED';

      const conf = (data.confidence * 100).toFixed(0);
      const confEl = document.getElementById('confValue');
      confEl.textContent = conf + '%';
      confEl.className = 'm-value ' + (data.confidence > 0.7 ? 'high' : data.confidence > 0.4 ? 'medium' : 'low');

      document.getElementById('latValue').textContent = (data.latency_ms / 1000).toFixed(1) + 's';
      document.getElementById('protoValue').textContent = data.protocol_used.toUpperCase();

      let html = '';
      html += '<div class="section-label">RULING</div>';
      html += `<div class="ruling-text">${escHtml(data.ruling)}</div>`;
      if (data.minority_report) {
        html += '<div class="section-label" style="color:var(--red)">MINORITY REPORT</div>';
        html += `<div class="minority-text">${escHtml(data.minority_report)}</div>`;
      }
      if (data.degraded) {
        html += '<div class="section-label" style="color:var(--red)">DEGRADED</div>';
        html += `<div style="color:var(--red)">Failed: ${data.failed_nodes.join(', ')}</div>`;
      }
      document.getElementById('decisionContent').innerHTML = html;
      break;

    case 'error':
      document.getElementById('statusText').textContent = 'ERROR: ' + data.message;
      break;
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

document.getElementById('queryInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); execute(); }
});
</script>
</body>
</html>
