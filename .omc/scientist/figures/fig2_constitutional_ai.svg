<?xml version="1.0" encoding="UTF-8"?>
<svg width="760" height="460" xmlns="http://www.w3.org/2000/svg" font-family="Arial,sans-serif">
  <rect width="760" height="460" fill="#f8f9fa"/>
  <text x="380" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Constitutional AI: Critique-Revision Loop (Anthropic, 2022)</text>

  <!-- Phase label: SL -->
  <rect x="20" y="50" width="360" height="350" rx="10" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="200" y="72" text-anchor="middle" font-size="11" fill="#666" font-style="italic">Phase 1: Supervised Learning (SL)</text>

  <!-- Phase label: RL -->
  <rect x="400" y="50" width="340" height="350" rx="10" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="570" y="72" text-anchor="middle" font-size="11" fill="#666" font-style="italic">Phase 2: Reinforcement Learning (RL/RLAIF)</text>

  <!-- SL Step 1: Harmful prompt -->
  <rect x="40" y="85" width="160" height="55" rx="8" fill="#f8d7da" stroke="#721c24" stroke-width="1.8"/>
  <text x="120" y="109" text-anchor="middle" font-size="11" font-weight="bold" fill="#721c24">Harmful Prompt</text>
  <text x="120" y="127" text-anchor="middle" font-size="9" fill="#721c24">Red-team style input</text>

  <!-- Arrow down -->
  <line x1="120" y1="140" x2="120" y2="175" stroke="#555" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- SL Step 2: Initial response -->
  <rect x="40" y="175" width="160" height="55" rx="8" fill="#fff3cd" stroke="#856404" stroke-width="1.8"/>
  <text x="120" y="199" text-anchor="middle" font-size="11" font-weight="bold" fill="#664d03">Initial Response</text>
  <text x="120" y="217" text-anchor="middle" font-size="9" fill="#664d03">Helpful-only LLM</text>

  <!-- Arrow down -->
  <line x1="120" y1="230" x2="120" y2="265" stroke="#555" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- SL Step 3: Critique -->
  <rect x="40" y="265" width="160" height="60" rx="8" fill="#d1ecf1" stroke="#0c5460" stroke-width="1.8"/>
  <text x="120" y="289" text-anchor="middle" font-size="11" font-weight="bold" fill="#0c5460">Critique</text>
  <text x="120" y="305" text-anchor="middle" font-size="9" fill="#0c5460">LLM evaluates vs.</text>
  <text x="120" y="318" text-anchor="middle" font-size="9" fill="#0c5460">constitutional principle</text>

  <!-- Arrow right -->
  <line x1="200" y1="295" x2="235" y2="295" stroke="#555" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- SL Step 4: Revision -->
  <rect x="235" y="265" width="125" height="60" rx="8" fill="#d4edda" stroke="#155724" stroke-width="1.8"/>
  <text x="297" y="289" text-anchor="middle" font-size="11" font-weight="bold" fill="#155724">Revision</text>
  <text x="297" y="307" text-anchor="middle" font-size="9" fill="#155724">Rewrite to satisfy</text>
  <text x="297" y="320" text-anchor="middle" font-size="9" fill="#155724">principle</text>

  <!-- Loop arrow back up (curved) -->
  <path d="M 360 295 Q 390 240 360 185" stroke="#888" stroke-width="1.3" fill="none" stroke-dasharray="4,3" marker-end="url(#a2)"/>
  <text x="372" y="242" font-size="8" fill="#888" transform="rotate(-10,372,242)">N iterations</text>

  <!-- SL Step 5: Fine-tune -->
  <rect x="40" y="355" width="320" height="40" rx="8" fill="#e2d9f3" stroke="#6f42c1" stroke-width="1.8"/>
  <text x="200" y="380" text-anchor="middle" font-size="11" font-weight="bold" fill="#6f42c1">Fine-tune original model on revised responses (SL-CAI)</text>
  <line x1="200" y1="325" x2="200" y2="355" stroke="#6f42c1" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- RL Phase -->
  <!-- Step 1: Sample pairs -->
  <rect x="420" y="90" width="145" height="55" rx="8" fill="#fff3cd" stroke="#856404" stroke-width="1.8"/>
  <text x="492" y="114" text-anchor="middle" font-size="11" font-weight="bold" fill="#664d03">Sample Response Pairs</text>
  <text x="492" y="132" text-anchor="middle" font-size="9" fill="#664d03">from SL-CAI model</text>

  <!-- Arrow down -->
  <line x1="492" y1="145" x2="492" y2="185" stroke="#555" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- AI Comparison -->
  <rect x="420" y="185" width="145" height="55" rx="8" fill="#d1ecf1" stroke="#0c5460" stroke-width="1.8"/>
  <text x="492" y="209" text-anchor="middle" font-size="11" font-weight="bold" fill="#0c5460">AI Comparison</text>
  <text x="492" y="227" text-anchor="middle" font-size="9" fill="#0c5460">LLM picks better response</text>

  <!-- Arrow down -->
  <line x1="492" y1="240" x2="492" y2="280" stroke="#555" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Preference Model -->
  <rect x="420" y="280" width="145" height="55" rx="8" fill="#d4edda" stroke="#155724" stroke-width="1.8"/>
  <text x="492" y="304" text-anchor="middle" font-size="11" font-weight="bold" fill="#155724">Preference Model</text>
  <text x="492" y="322" text-anchor="middle" font-size="9" fill="#155724">(RLAIF reward signal)</text>

  <!-- Arrow down -->
  <line x1="492" y1="335" x2="492" y2="355" stroke="#555" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- RL Training -->
  <rect x="420" y="355" width="145" height="40" rx="8" fill="#e2d9f3" stroke="#6f42c1" stroke-width="1.8"/>
  <text x="492" y="379" text-anchor="middle" font-size="11" font-weight="bold" fill="#6f42c1">RL Training (RL-CAI)</text>

  <!-- Constitution box -->
  <rect x="590" y="160" width="140" height="80" rx="8" fill="#fce8e6" stroke="#c0392b" stroke-width="1.8"/>
  <text x="660" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">Constitution</text>
  <text x="660" y="203" text-anchor="middle" font-size="9" fill="#c0392b">~16 principles</text>
  <text x="660" y="218" text-anchor="middle" font-size="9" fill="#c0392b">(e.g. "be harmless")</text>
  <text x="660" y="233" text-anchor="middle" font-size="9" fill="#c0392b">Human-authored</text>

  <!-- Arrow: constitution -> critique -->
  <line x1="590" y1="200" x2="565" y2="200" stroke="#c0392b" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#a4)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6f42c1"/>
    </marker>
    <marker id="a4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c0392b"/>
    </marker>
  </defs>
</svg>